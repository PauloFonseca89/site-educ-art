<svg xmlns="http://www.w3.org/2000/svg" width="420" height="130" viewBox="0 0 420 130" role="img">
  <title>Educ-Art — Logotipo Laranja Vibrante</title>



  <!-- CHAPÉU ACADÉMICO GEOMÉTRICO -->
  <!-- Base plana (parte branca esquerda) -->
  <polygon points="56,78 8,55 56,32 104,55" fill="#ffffff"/>
  <!-- Face direita (laranja) -->
  <polygon points="56,32 104,55 104,79 56,56" fill="#FF7A00"/>
  <!-- Haste vertical -->
  <line x1="104" y1="55" x2="104" y2="95" stroke="#FF7A00" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Bola no fim da haste -->
  <circle cx="104" cy="100" r="6" fill="#FF7A00"/>

  <!-- TEXTO: educ·art numa só linha sem desalinhamentos -->
  <text font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="38" font-weight="800" letter-spacing="-1">
    <tspan x="126" y="68" fill="#1A1A18">educ</tspan><tspan fill="#FF7A00">·</tspan><tspan fill="#1A1A18">art</tspan>
  </text>

  <!-- SUBTÍTULO -->
  <text x="127" y="88" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="11.5" font-weight="500" fill="rgba(0,0,0,0.3)" letter-spacing="3.5">PREPARAÇÃO · EXAMES</text>

</svg>
